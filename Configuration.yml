---
- name: Cisco Manual SSH Portal (Full Output)
  hosts: switches
  gather_facts: no
  connection: network_cli

  vars:
    ansible_network_os: cisco.ios.ios
    manual_ssh_input: ""

  tasks:
    - name: 1. Prepare terminal and Execute Commands
      ansible.netcommon.cli_command:
        # Fixed: using 'command' instead of 'commands'
        # We inject 'terminal length 0' to ensure no pagination pauses
        command: "{{ item }}"
      loop: "{{ (['terminal length 0', 'terminal width 0'] + manual_ssh_input.split('\n')) | select('regex', '\\S') | list }}"
      register: ssh_results
      when: manual_ssh_input | trim | length > 0
      ignore_errors: yes

    - name: 2. Stream Console Output
      ansible.builtin.debug:
        msg: "{{ line }}"
      # This 'flatten' is the secret: it breaks the output into individual lines 
      # so AWX doesn't truncate a giant JSON block.
      loop: "{{ ssh_results.results | map(attribute='stdout_lines') | default([]) | flatten }}"
      when: ssh_results.results is defined
