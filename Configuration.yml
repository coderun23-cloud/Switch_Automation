---
- name: Cisco Manual SSH Portal (Full Output)
  hosts: switches
  gather_facts: no
  connection: network_cli

  vars:
    ansible_network_os: cisco.ios.ios
    manual_ssh_input: ""

  tasks:

    - name: Prepare terminal for full output
      ansible.netcommon.cli_command:
        commands:
          - terminal length 0
          - terminal width 0

    - name: Apply configuration commands
      cisco.ios.ios_config:
        lines: "{{ manual_ssh_input.split('\n') | select('regex', '\\S') | list }}"
      register: config_results
      when: manual_ssh_input | trim | length > 0

    - name: Display applied configuration
      debug:
        var: config_results
      when: manual_ssh_input | trim | length > 0
