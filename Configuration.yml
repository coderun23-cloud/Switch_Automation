---
- name: Cisco Manual SSH Portal (Full Output)
  hosts: switches
  gather_facts: no
  connection: network_cli

  vars:
    ansible_network_os: cisco.ios.ios
    manual_ssh_input: ""

  tasks:

    - name: Prepare terminal for full output
      ansible.netcommon.cli_command:
        commands:
          - terminal length 0
          - terminal width 0

    - name: Execute Manual CLI Input
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      loop: "{{ manual_ssh_input.split('\n') | select('regex', '\\S') | list }}"
      register: ssh_results
      when: manual_ssh_input | trim | length > 0

    - name: Display full console output
      ansible.builtin.debug:
        msg: |
          ┌─────────────────────────────────────────────────────────────┐
          │ SSH CONSOLE SESSION: {{ inventory_hostname }}
          └─────────────────────────────────────────────────────────────┘
          {% for result in ssh_results.results %}
          {{ inventory_hostname }}# {{ result.item }}
          {% if result.stdout_lines is defined %}
          {% for line in result.stdout_lines %}
          {{ line }}
          {% endfor %}
          {% endif %}

          {% endfor %}
          ───────────────────────────────────────────────────────────────
          [ SESSION END ]
      when: manual_ssh_input | trim | length > 0
